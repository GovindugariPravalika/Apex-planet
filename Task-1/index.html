<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My First Webpage</title>

  <!-- Internal CSS for styling -->
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 0;
      color: #333;
    }

    header {
      background-color: #4a90e2;
      color: white;
      padding: 20px;
      text-align: center;
    }

    main {
      padding: 30px;
      text-align: center;
    }

    img {
      width: 250px;
      height: auto;
      margin: 20px 0;
      border-radius: 10px;
    }

    a {
      color: #4a90e2;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #218838;
    }

    footer {
      background-color: #eee;
      text-align: center;
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Page Content -->
  <header>
    <h1>Welcome to My Simple Webpage</h1>
    <p>Learning HTML, CSS, and JavaScript Step-by-Step</p>
  </header>

  <main>
    <h2>About This Page</h2>
    <p>This is a simple webpage with structure, style, and interactivity.</p>

    <img src=https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRq_fjRVJLHlGB9w7R5zuvuciwZ9zwgGN6-oQ&s alt="Sample Image" />

    <p>Visit <a href="https://www.w3schools.com" target="_blank">W3Schools</a> to learn more.</p>

    <!-- JavaScript interaction -->
    <button onclick="showMessage()">Click Me!</button>
  </main>

  <footer>
    <p>© 2025 My Webpage. All rights reserved.</p>
  </footer>

  <!-- JavaScript function -->
  <script>
    function showMessage() {
      alert("Hello! You clicked the button.");
    }
  </script>
</body>
</html>
